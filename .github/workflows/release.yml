# Activates after this local Git repository is pushed to GitHub and repository secrets are configured.
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_chrome:
        description: Optionally publish the Chrome package to the Chrome Web Store
        required: false
        default: false
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create Chrome ZIP
        run: npm run zip

      - name: Create Firefox and source ZIPs
        run: npm run zip:firefox

      - name: Publish to Firefox AMO
        run: npx wxt submit --chrome-zip .output/*-chrome.zip --firefox-zip .output/*-firefox.zip --firefox-sources-zip .output/*-sources.zip
        env:
          FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}

      - name: Attach ZIPs to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: .output/*.zip

  # Optional and manual only. Missing Chrome credentials never affect the Firefox release job.
  publish_chrome:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_chrome }}
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create Chrome ZIP
        run: npm run zip

      - name: Publish to Chrome Web Store
        run: npx wxt submit --chrome-zip .output/*-chrome.zip --chrome-extension-id "$CHROME_EXTENSION_ID" --chrome-client-id "$CHROME_CLIENT_ID" --chrome-client-secret "$CHROME_CLIENT_SECRET" --chrome-refresh-token "$CHROME_REFRESH_TOKEN"
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
