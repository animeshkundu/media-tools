name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: Rebuild and replace assets for the current package version
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    name: Detect unreleased version
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should-release: ${{ steps.version.outputs.should-release }}
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out repository and tags
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Validate version and determine whether to release
        id: version
        env:
          FORCE_RELEASE: ${{ inputs.force || 'false' }}
        shell: bash
        run: |
          set -euo pipefail
          version=$(node -p "require('./package.json').version")
          lock_version=$(node -p "require('./package-lock.json').version")
          root_lock_version=$(node -p "require('./package-lock.json').packages[''].version")

          if [[ ! "$version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "package.json version must be a stable semantic version (N.N.N), got: $version" >&2
            exit 1
          fi
          if [[ "$lock_version" != "$version" || "$root_lock_version" != "$version" ]]; then
            echo "package.json and package-lock.json versions must match" >&2
            exit 1
          fi
          if ! grep -qF "## [$version]" docs/CHANGELOG.md; then
            echo "docs/CHANGELOG.md has no release section for $version" >&2
            exit 1
          fi

          tag="v${version}"
          should_release=true
          if git rev-parse --verify --quiet "refs/tags/${tag}" >/dev/null && [[ "$FORCE_RELEASE" != "true" ]]; then
            should_release=false
            echo "${tag} already exists; no release is required."
          else
            echo "${tag} will be built and published."
          fi

          {
            echo "version=${version}"
            echo "tag=${tag}"
            echo "should-release=${should_release}"
          } >> "$GITHUB_OUTPUT"
          echo "### Release detection: ${tag} (publish: ${should_release})" >> "$GITHUB_STEP_SUMMARY"

  package:
    name: Test and package
    if: needs.prepare.outputs.should-release == 'true'
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile, lint, and test
        run: npm run check

      - name: Build Chrome and Firefox extensions
        run: |
          npm run build
          npm run build:firefox

      - name: Install Firefox and system dependencies
        run: npx playwright install --with-deps firefox

      - name: Lint built Firefox extension
        run: npx web-ext lint --source-dir .output/firefox-mv3

      - name: Run real-Firefox end-to-end tests
        run: npm run test:e2e

      - name: Assert E2E specs actually executed
        run: node tests/e2e/assert-e2e-ran.mjs

      - name: Package browser extensions and Firefox sources
        run: |
          npm run zip
          npm run zip:firefox

      - name: Verify packaged versions
        env:
          EXPECTED_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          node --input-type=module <<'EOF'
          import assert from 'node:assert/strict';
          import { readFile } from 'node:fs/promises';

          for (const target of ['chrome-mv3', 'firefox-mv3']) {
            const manifest = JSON.parse(await readFile(`.output/${target}/manifest.json`, 'utf8'));
            assert.equal(manifest.version, process.env.EXPECTED_VERSION, `${target} version mismatch`);
          }
          EOF

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd .output
          shopt -s nullglob
          zip_files=( *.zip )
          (( ${#zip_files[@]} > 0 )) || { echo "No ZIP artifacts found" >&2; exit 1; }
          sha256sum -- "${zip_files[@]}" > SHA256SUMS

      - name: Upload release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets-${{ needs.prepare.outputs.tag }}
          path: |
            .output/*.zip
            .output/SHA256SUMS
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 14

      - name: Upload E2E report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-e2e-report-${{ needs.prepare.outputs.tag }}
          path: |
            e2e-results.json
            playwright-report/
          if-no-files-found: warn
          retention-days: 14

  publish:
    name: Sign and publish
    if: needs.prepare.outputs.should-release == 'true'
    needs: [prepare, package]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets-${{ needs.prepare.outputs.tag }}
          path: .output

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: 'v3.0.6'

      - name: Sign release assets with GitHub OIDC
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=( .output/*.zip .output/SHA256SUMS )
          (( ${#files[@]} > 1 )) || { echo "Release assets are incomplete" >&2; exit 1; }
          for file in "${files[@]}"; do
            cosign sign-blob --yes --new-bundle-format --bundle "${file}.sigstore.json" "${file}"
          done

      - name: Verify signed checksums
        shell: bash
        run: |
          set -euo pipefail
          cosign verify-blob \
            --new-bundle-format \
            --bundle .output/SHA256SUMS.sigstore.json \
            --certificate-identity 'https://github.com/animeshkundu/media-tools/.github/workflows/release.yml@refs/heads/main' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            .output/SHA256SUMS

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ startsWith(needs.prepare.outputs.version, '0.') }}
          files: |
            .output/*.zip
            .output/SHA256SUMS
            .output/*.sigstore.json
          fail_on_unmatched_files: true

  publish-firefox:
    name: Publish to Firefox AMO
    if: vars.PUBLISH_FIREFOX == 'true' && github.event_name == 'push'
    needs: [prepare, publish]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: firefox-amo
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets-${{ needs.prepare.outputs.tag }}
          path: .output

      - name: Submit listed extension to Firefox AMO
        env:
          FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
        run: |
          npx wxt submit \
            --firefox-zip .output/*-firefox.zip \
            --firefox-sources-zip .output/*-sources.zip \
            --firefox-channel listed
