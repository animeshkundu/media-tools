# Activates after this local Git repository is pushed to GitHub and repository secrets are configured.
name: CI

on: [push, pull_request]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build Chrome extension
        run: npm run build

      - name: Build Firefox extension
        run: npm run build:firefox

      - name: Verify the built bundle makes no network calls
        run: |
          set -euo pipefail
          js_count=$(find .output -name '*.js' | wc -l | tr -d ' ')
          if [ "$js_count" -eq 0 ]; then
            echo "No built JavaScript found to scan" >&2
            exit 1
          fi
          if grep -R -n -E 'fetch\(|XMLHttpRequest|WebSocket|sendBeacon|EventSource' .output --include='*.js'; then
            echo "ERROR: a network primitive appears in the built bundle above." >&2
            exit 1
          fi
          echo "OK: scanned ${js_count} built JS files across both targets; no network primitives."

      - name: Test CSP manifest guard
        run: |
          node --input-type=module <<'EOF'
          import assert from 'node:assert/strict';
          import { readFile } from 'node:fs/promises';
          import { validateManifest } from './scripts/check-csp.mjs';

          const manifest = JSON.parse(
            await readFile('.output/chrome-mv3/manifest.json', 'utf8'),
          );
          const policy = manifest.content_security_policy.extension_pages;
          const directives = policy.split(';').map((directive) => directive.trim());
          const replaceDirective = (name, value) =>
            directives
              .map((directive) => (directive.split(/\s+/, 1)[0] === name ? `${name} ${value}` : directive))
              .join('; ');

          for (const [name, candidatePolicy] of [
            [
              'missing directive',
              directives.filter((directive) => !directive.startsWith('frame-src ')).join('; '),
            ],
            ['network source', replaceDirective('connect-src', "'self'")],
            ['unapproved directive', `${policy}; prefetch-src https://example.com`],
            ['non-ascii no-break space', policy.replace("connect-src 'none'", "connect-src\u00A0'none'")],
            ['non-ascii bom', policy.replace("default-src 'none'", "default-src\uFEFF'none'")],
          ]) {
            const candidate = structuredClone(manifest);
            candidate.content_security_policy.extension_pages = candidatePolicy;
            assert.throws(() => validateManifest(candidate, name), { name: 'Error' });
          }
          EOF

      - name: Verify extension CSP
        run: |
          node scripts/check-csp.mjs \
            .output/chrome-mv3/manifest.json \
            .output/firefox-mv3/manifest.json

      - name: Verify manifest egress keys
        run: node scripts/check-manifest-egress.mjs

      - name: Upload extension builds
        uses: actions/upload-artifact@v7
        with:
          name: extension-builds
          path: .output/

  firefox-e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CI: 'true'
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Firefox extension
        run: npm run build:firefox

      - name: Install Playwright Firefox with system dependencies
        run: npx playwright install --with-deps firefox

      - name: Lint built Firefox extension
        run: npx web-ext lint --source-dir .output/firefox-mv3

      - name: Run Firefox E2E tests
        run: npx playwright test --config=playwright.config.ts

      - name: Verify Firefox E2E results
        if: ${{ always() }}
        run: |
          node --input-type=module <<'EOF'
          import { readFile } from 'node:fs/promises';

          const resultPath = 'test-results/playwright-results.json';
          let report;
          try {
            report = JSON.parse(await readFile(resultPath, 'utf8'));
          } catch (error) {
            throw new Error(`Firefox E2E result is missing or invalid: ${error.message}`);
          }

          const tests = [];
          const collectTests = (suites = []) => {
            for (const suite of suites) {
              for (const spec of suite.specs ?? []) {
                for (const test of spec.tests ?? []) {
                  tests.push({ title: spec.title, ...test });
                }
              }
              collectTests(suite.suites);
            }
          };
          collectTests(report.suites);

          const stats = report.stats;
          for (const name of ['expected', 'skipped', 'unexpected', 'flaky']) {
            if (!Number.isInteger(stats?.[name]) || stats[name] < 0) {
              throw new Error(`Firefox E2E result has invalid stats.${name}`);
            }
          }

          let passed = 0;
          const invalid = [];
          for (const test of tests) {
            const results = Array.isArray(test.results) ? test.results : [];
            const finalResult = results.at(-1);
            const cleanPass =
              test.expectedStatus === 'passed' &&
              test.status === 'expected' &&
              results.length > 0 &&
              results.every((result) => result.status === 'passed') &&
              finalResult.status === 'passed';
            if (cleanPass) passed += 1;
            else invalid.push(`${test.projectName}: ${test.title}`);
          }

          const { expected, skipped, unexpected, flaky } = stats;
          const discovered = tests.length;
          const classified = expected + skipped + unexpected + flaky;
          console.log(
            `Firefox E2E result: discovered=${discovered} expected=${expected} passed=${passed} skipped=${skipped} unexpected=${unexpected} flaky=${flaky}`,
          );

          if (
            expected !== passed ||
            passed < 4 ||
            skipped > 0 ||
            unexpected > 0 ||
            flaky > 0 ||
            discovered !== classified ||
            discovered !== passed ||
            invalid.length > 0 ||
            (report.errors?.length ?? 0) > 0
          ) {
            if (invalid.length > 0) console.error(`Non-passing tests: ${invalid.join('; ')}`);
            throw new Error('Firefox E2E result gate failed. All discovered tests must pass, with at least 4 passes and no skips.');
          }
          EOF

      - name: Upload Firefox E2E failure artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: firefox-e2e-failure
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn
