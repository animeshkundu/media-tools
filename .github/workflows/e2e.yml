name: Firefox E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  firefox:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Firefox extension
        run: npm run build:firefox

      - name: Install Firefox and system dependencies
        run: npx playwright install --with-deps firefox

      - name: Lint built Firefox extension
        run: npx web-ext lint --source-dir .output/firefox-mv3

      - name: Run real-Firefox end-to-end tests
        run: npm run test:e2e

      - name: Assert E2E specs actually executed
        run: node tests/e2e/assert-e2e-ran.mjs

      - name: Upload E2E report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: media-tools-e2e-report
          path: |
            e2e-results.json
            playwright-report/
          if-no-files-found: warn
