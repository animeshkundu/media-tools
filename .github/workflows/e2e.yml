name: Firefox E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firefox-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  firefox:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Firefox extension
        run: npm run build:firefox

      - name: Install Firefox and system dependencies
        run: npx playwright install --with-deps firefox

      - name: Lint built Firefox extension
        run: npx web-ext lint --source-dir .output/firefox-mv3

      - name: Run real-Firefox end-to-end tests
        run: npm run test:e2e

      - name: Assert E2E specs actually executed
        run: node tests/e2e/assert-e2e-ran.mjs

      - name: Upload E2E report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: media-tools-e2e-report
          path: |
            e2e-results.json
            playwright-report/
          if-no-files-found: warn
